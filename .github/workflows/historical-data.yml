name: Tarihsel Veri Toplama

# Manuel tetiklenen workflow: yfinance ile geçmiş makro/endeks verisi toplar.
# Topladığı veriyi DB'ye yazar; isterse repoya commit eder.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Kaç günlük geçmiş toplansın? (varsayılan 365)"
        required: false
        default: "365"
      commit_db:
        description: "DB'yi repoya commitle (true/false)"
        required: false
        default: "false"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Collect historical data
        run: |
          python scripts/collect_historical_data.py "${{ github.event.inputs.days || '365' }}"

      - name: Upload DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kizilelma-db-historical-${{ github.run_id }}
          path: kizilelma.db
          retention-days: 90

      - name: Commit DB (opsiyonel)
        if: ${{ github.event.inputs.commit_db == 'true' }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add kizilelma.db
          git commit -m "Tarihsel veri güncellendi (${{ github.event.inputs.days || '365' }} gün)" || echo "No changes"
          git push
