# Railway / Nixpacks build yapılandırması
# Python 3.11 + gerekli sistem paketleri ile kurulum yapar
[phases.setup]
nixPkgs = ['python311', 'python311Packages.pip', 'python311Packages.virtualenv', 'gcc']

[phases.install]
cmds = [
  'python -m venv /opt/venv',
  '. /opt/venv/bin/activate && pip install --upgrade pip',
  '. /opt/venv/bin/activate && pip install -e .'
]

[start]
cmd = '. /opt/venv/bin/activate && kizilelma-web'

[variables]
PYTHONUNBUFFERED = '1'
PYTHONDONTWRITEBYTECODE = '1'
